function handleMCQ(btn, isCorrect, questionEl) {

  questionEl.querySelectorAll('.mcq-feedback').forEach(f => f.remove());
  questionEl.querySelectorAll('.mcq-btn').forEach(b => {
    b.style.background = '';
    b.style.borderColor = '';
    b.style.color = '';
  });

  const fb = document.createElement('div');
  fb.className = 'mcq-feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '✓ Correct!' : '✗ Incorrect — try again!';
  btn.closest('.mcq-options').after(fb);

/* ── MCQ Engine: Randomized & Persistent Feedback ── */

function mcqBlock(options, correctIndex) {
    const letters = ['A', 'B', 'C'];
    
    // 1. Map options to objects to track the correct one during shuffle
    let list = options.map((text, i) => ({
        text: text,
        isCorrect: i === correctIndex
    }));

    // 2. Shuffle the array randomly
    list.sort(() => Math.random() - 0.5);

    // 3. Generate HTML
    // We assign letters A, B, C based on the NEW position after the shuffle
    const buttons = list.map((item, i) => {
        return `
            <button class="mcq-btn" 
                onclick="handleMCQ(this, ${item.isCorrect})">
                (${letters[i]}) ${item.text}
            </button>
        `;
    }).join('');

    return `<div class="mcq-options">${buttons}</div><div class="mcq-feedback"></div>`;
}

/**
 * Handles the click event for MCQ buttons.
 * @param {HTMLElement} btn - The clicked button element.
 * @param {boolean} isCorrect - Whether the choice is correct.
 */
function handleMCQ(btn, isCorrect) {
    // Prevent multiple clicks on the same question set if desired
    const container = btn.closest('.mcq-options');
    
    if (isCorrect) {
        // Apply persistent green styling
        btn.style.background = "var(--green)";
        btn.style.color = "white";
        btn.style.borderColor = "var(--green-dark)";
        btn.innerText = "✓ " + btn.innerText;
    } else {
        // Apply persistent red/coral styling
        btn.style.background = "var(--coral)";
        btn.style.color = "white";
        btn.style.borderColor = "var(--coral-dark)";
        btn.innerText = "✗ " + btn.innerText;
    }

    // Disable all buttons in this specific question so the user can't change their answer
    const allBtns = container.querySelectorAll('.mcq-btn');
    allBtns.forEach(b => {
        b.style.pointerEvents = 'none';
        if (b !== btn) b.style.opacity = "0.6"; // Dim the unselected options
    });
}

/* ============================================================
   ENGINE
   ============================================================ */
function renderStepContent(step, topicCol) {
  if (!step.content) {
    return `<div class="step-content-area">
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8.5" stroke="#bbb" stroke-width="1.2"/>
            <path d="M10 6v4l2.5 2.5" stroke="#bbb" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="empty-title">Coming soon</div>
        <div class="empty-sub">Content for <strong>${step.label}</strong> will be added by your teacher. Check back soon!</div>
      </div>
    </div>`;
  }
  return `<div class="step-content-area">${step.content}</div>`;
}

function buildTopic(topic, termId) {
  const col = topic.col;
  const topicDiv = document.createElement('div');
  topicDiv.className = 'topic-group';
  topicDiv.style.borderColor = col.border;

  // topic header
  const hdr = document.createElement('div');
  hdr.className = 'topic-header';
  hdr.style.background = col.light;
  hdr.innerHTML = `
    <div class="topic-dot" style="background:${col.dot};color:${col.dotTxt};">${topic.steps.length}</div>
    <div class="topic-title" style="color:${col.text};">${topic.label}</div>
    <div class="topic-meta" style="color:${col.text};">${topic.steps.length} steps</div>
    <div class="topic-arrow" id="tarr-${termId}-${topic.id}" style="color:${col.text};">&#9654;</div>
  `;

  // topic body
  const body = document.createElement('div');
  body.className = 'topic-body';
  body.id = `tbody-${termId}-${topic.id}`;

  // step tabs row
  const tabsRow = document.createElement('div');
  tabsRow.className = 'step-tabs-row';

  // content area (inline, directly below tabs)
  const contentArea = document.createElement('div');
  contentArea.className = 'step-content-area hidden';
  contentArea.id = `scontent-${termId}-${topic.id}`;

  topic.steps.forEach((step, si) => {
    const hasContent = !!step.content;
    const btn = document.createElement('button');
    btn.className = 'step-tab';
    btn.innerHTML = `<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${hasContent?col.active:'#ccc'};margin-right:4px;vertical-align:middle;"></span>Step ${si+1}`;
    btn.title = step.label;
    btn.onclick = () => {
      // deactivate all tabs in this topic
      tabsRow.querySelectorAll('.step-tab').forEach(t => {
        t.classList.remove('active');
        t.style.background = '';
        t.style.color = '';
        t.style.borderColor = '';
      });
      btn.classList.add('active');
      btn.style.background = col.active;
      btn.style.color = 'white';
      btn.style.borderColor = col.active;

      contentArea.classList.remove('hidden');
      contentArea.innerHTML = renderStepContent(step, col);
      // attach MCQ handlers (already inline via onclick in HTML strings)
      contentArea.scrollIntoView({ behavior:'smooth', block:'nearest' });
    };
    tabsRow.appendChild(btn);
  });

  body.appendChild(tabsRow);
  body.appendChild(contentArea);

  hdr.onclick = () => {
    const b = document.getElementById(`tbody-${termId}-${topic.id}`);
    const a = document.getElementById(`tarr-${termId}-${topic.id}`);
    const isOpen = b.classList.contains('open');
    b.classList.toggle('open', !isOpen);
    a.classList.toggle('open', !isOpen);
  };

  topicDiv.appendChild(hdr);
  topicDiv.appendChild(body);
  return topicDiv;
}

function build() {
  const container = document.getElementById('term-groups');
  SCHEME.forEach(term => {
    const col = term.col;
    const termDiv = document.createElement('div');
    termDiv.className = 'term-group';
    termDiv.style.borderColor = col.border;

    const hdr = document.createElement('div');
    hdr.className = 'term-header';
    hdr.style.background = col.bg;
    hdr.innerHTML = `
      <div class="term-icon">${term.emoji}</div>
      <div class="term-title" style="color:${col.title};">${term.label}</div>
      <div class="term-meta" style="color:${col.title};">${term.meta}</div>
      <div class="term-arrow${term.open?' open':''}" id="termarr-${term.id}" style="color:${col.title};">&#9654;</div>
    `;

    const body = document.createElement('div');
    body.id = `termbody-${term.id}`;
    body.className = 'term-body' + (term.open ? ' open' : '');

    term.topics.forEach(topic => {
      body.appendChild(buildTopic(topic, term.id));
    });

    hdr.onclick = () => {
      const b = document.getElementById(`termbody-${term.id}`);
      const a = document.getElementById(`termarr-${term.id}`);
      const isOpen = b.classList.contains('open');
      b.classList.toggle('open', !isOpen);
      a.classList.toggle('open', !isOpen);
    };

    termDiv.appendChild(hdr);
    termDiv.appendChild(body);
    container.appendChild(termDiv);
  });
}

build();
